<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Quack Arcade 🦆</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="game"></canvas>
    </div>
    <button id="mute" aria-label="Ton an/aus" title="Ton an/aus">🔊</button>
    <div id="mic" hidden>
      <button id="mic-toggle" aria-pressed="false" title="Mit Quietsche-Ente spielen">
        🦆 Quietschen = Sprung
      </button>
      <div id="mic-cal" hidden>
        <div id="mic-meter">
          <div id="mic-fill"></div>
          <div id="mic-tick"></div>
        </div>
        <label
          >Empfindlichkeit
          <input id="mic-sens" type="range" min="0" max="1" step="0.05" value="0.6" />
        </label>
        <p id="mic-status">Audio bleibt im Browser. Nichts wird gesendet oder gespeichert.</p>
      </div>
    </div>
    <script type="module" src="src/main.js"></script>
  </body>
</html>
